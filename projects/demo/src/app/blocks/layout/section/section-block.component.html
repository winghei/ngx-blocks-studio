<section class="section-block">
  @if (title()) {
    <h2 class="section-title">{{ title() }}</h2>
  }
  <div class="section-content">
    @for (child of children(); track $index) {
      <div
        block
        [description]="child"
        [blockRegistry]="getRegistry()">
      </div>
    }
  </div>
</section>
