@if (blockDescription(); as desc) {
  <div class="block-host">
 
    <div
      block
      [description]="desc"
      [model]="model()"
      [blockRegistry]="getRegistry()"
      [blockDefinitions]="blockDefinitions()">
    </div>
  </div>
} @else {
  <p class="block-host-empty">No block description in route data.</p>
}
